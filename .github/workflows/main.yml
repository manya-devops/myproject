name: My First CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Run Python file
      run: python app.py

    - name: Install pytest
      run: pip install pytest

    - name: Run tests
      run: pytest

    - name: Deploy step
      run: echo "Deploying application..."


